name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install SBCL
        run: sudo apt-get update && sudo apt-get install -y sbcl

      - name: Build
        run: make build

      - name: Unit Tests
        run: make test
