name: Conformance
on: [push, pull_request]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  conformance:
    name: Conformance (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [cpython, clython]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install conformance dependencies
        run: |
          cd tests/conformance
          pip install -e . || pip install pytest

      - name: Install SBCL
        if: matrix.target == 'clython'
        run: sudo apt-get update && sudo apt-get install -y sbcl

      - name: Build Clython
        if: matrix.target == 'clython'
        run: make build

      - name: Run conformance tests
        run: make conformance-${{ matrix.target }}
