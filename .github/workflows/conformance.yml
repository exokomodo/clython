name: Conformance
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  conformance:
    name: Conformance (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - cpython
          - clython
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12.x'  # Clython targets Python 3.12 — pin this

      - name: Install conformance dependencies
        run: |
          make setup/python

      - name: Install SBCL
        if: matrix.target == 'clython'
        run: |
          make setup/sbcl

      - name: Build Clython
        if: matrix.target == 'clython'
        run: |
          make build

      - name: Run conformance tests
        run: |
          make conformance-${{ matrix.target }}
